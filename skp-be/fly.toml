app = "skp-be"
primary_region = "sin"
kill_signal = "SIGINT"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile"

[env]
  # Non-secret config goes here. DATABASE_URL is a Fly secret (Step 6).
  CORS_ORIGINS = "*"
  JWT_EXPIRES_MINUTES = "43200"

[http_service]
  internal_port = 8000
  auto_stop_machines = "stop"       # scale to zero (serverless-ish)
  auto_start_machines = true
  min_machines_running = 0
  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[checks]
  [checks.health]
    grace_period = "80s"
    interval = "60s"
    timeout = "5s"
    path = "/"
    type = "http"