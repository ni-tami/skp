# Alembic configuration for skp-be
# Async engine + URL are injected by migrations/env.py (DB URL comes from
# DATABASE_URL env var, mirroring app/db/connection.py).

[alembic]
# Path to the migration scripts
script_location = migrations

# Path to prepend to sys.path (project root so `app.*` imports work)
prepend_sys_path = .

# Template used for new revision files
# script_template = ...

# Timezone for filenames. Default: null (uses local system time)
# timezone = UTC

# Max length of characters for file names (slugified revision message)
# file_template = %%(rev)s_%%(slug)s

# sqlalchemy.url is intentionally empty; migrations/env.py overrides it.
sqlalchemy.url =

[post_write_hooks]
# Run ruff format on generated migrations
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format -n

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S